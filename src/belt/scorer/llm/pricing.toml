# LLM judge pricing table.
#
# Loaded at import by belt.scorer.llm.pricing. Set BELT_PRICING_FILE to a
# path with the same schema to fully replace this bundled table; the env
# override is not merged.
#
# Schema (per row, all USD per token):
#   input_per_token   (required, float)
#   output_per_token  (required, float)
#   valid_from        (optional, ISO date the rate took effect)
#   source_url        (optional, link to the provider pricing page)
#
# Keys are lowercase canonical names; aliases live in [aliases]. ollama/*
# is treated as zero-cost in code (local inference) and needs no entry.
# Refresh policy: bump valid_from when a rate changes; add new rows for
# new families.

