config:
  line-length:
    line_length: 120
    code_blocks: false
    tables: false
    headings: false
  no-duplicate-heading:
    siblings_only: true
  first-line-heading: false
  table-column-style: false
  no-inline-html:
    allowed_elements:
      - details
      - summary

ignores:
  - "node_modules/**"
  - "venv/**"
  - ".cursor/**"
